name: snap

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release:
        description: "Release to Snap Store (false = build only)"
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-snap:
    name: Build snap (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: snapstore
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Inject release version into snapcraft.yaml
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Rendering snap version: ${VERSION}"
          sed -i "s/^version: .*/version: '${VERSION}'/" snap/snapcraft.yaml
          grep -E '^version:' snap/snapcraft.yaml

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Smoke-test built snap
        run: |
          sudo snap install --dangerous "${{ steps.build.outputs.snap }}"
          stegx --version

      - name: Upload snap artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: stegx-snap-${{ matrix.arch }}
          path: ${{ steps.build.outputs.snap }}
          retention-days: 30

      - name: Release to Snap Store
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || inputs.release }}
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
