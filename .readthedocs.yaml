version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      - python -m pip install --upgrade pip
    post_install:
      - python -m pip install -e .[all]

sphinx:
  configuration: docs/source/conf.py
  builder: html
  fail_on_warning: true

formats:
  - htmlzip
  - pdf
  - epub

python:
  install:
    - requirements: requirements/docs.txt
